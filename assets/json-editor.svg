<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2C5F8A"/>
    </linearGradient>
    <linearGradient id="brace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="10" y="10" width="236" height="236" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Curly braces { } -->
  <text x="128" y="148" font-family="monospace" font-size="120" font-weight="bold" 
        text-anchor="middle" dominant-baseline="central" fill="url(#brace)">
    { }
  </text>

  <!-- Small JSON-like decorative lines -->
  <rect x="70" y="90" width="40" height="3" rx="1.5" fill="#FFD700" opacity="0.7"/>
  <rect x="70" y="100" width="30" height="3" rx="1.5" fill="#FFD700" opacity="0.5"/>
  <rect x="146" y="90" width="40" height="3" rx="1.5" fill="#FFD700" opacity="0.7"/>
  <rect x="156" y="100" width="30" height="3" rx="1.5" fill="#FFD700" opacity="0.5"/>

  <!-- Colon separator -->
  <text x="128" y="148" font-family="monospace" font-size="80" font-weight="bold"
        text-anchor="middle" dominant-baseline="central" fill="white" opacity="0.3">
    :
  </text>

  <!-- Subtle shine effect -->
  <ellipse cx="80" cy="60" rx="60" ry="30" fill="white" opacity="0.08"/>
</svg>
