name: Publish Package
on:
  push:
    branches:
      - main

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            python3-venv \
            python3-build \
            python3-installer \
            python3-wheel \
            python3-setuptools \
            libgtk-4-dev \
            libadwaita-1-dev

      - name: Build package
        run: python3 -m build --wheel --no-isolation

      - name: Verify package
        run: |
          PKG=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$PKG" ]; then
            echo "Error: No wheel file found"
            exit 1
          fi
          echo "✅ $PKG built"
